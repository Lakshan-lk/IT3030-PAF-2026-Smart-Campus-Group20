spring.application.name=smartcampus
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# Server
server.port=8080

spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.bgesgbxmnowndvwzonjz
spring.datasource.password=PAF2025LPLS@123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=3                                                                                                                                                                                        
