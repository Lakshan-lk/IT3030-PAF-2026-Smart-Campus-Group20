groq.api.key=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
groq.api.model=llama-3.3-70b-versatile

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Data initialization
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=9
spring.flyway.locations=classpath:db/migration

# Multipart (file uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# File upload directory
app.upload-dir=uploads

# Google OAuth2
app.google-client-id=${GOOGLE_CLIENT_ID:}

# Logging
logging.level.com.campushub.smartcampus=DEBUG
logging.level.org.hibernate.SQL=DEBUG
