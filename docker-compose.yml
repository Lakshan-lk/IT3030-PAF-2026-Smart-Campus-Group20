services:
  postgres:
    image: postgres:17-alpine
    container_name: smartcampus-db
    environment:
      POSTGRES_DB: smartcampusdb
      POSTGRES_USER: smartcampus
      POSTGRES_PASSWORD: smartcampus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcampus -d smartcampusdb"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
