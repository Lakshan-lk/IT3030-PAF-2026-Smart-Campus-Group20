services:
  postgres:
    image: postgres:17-alpine
    container_name: smartcampus-db
    env_file:
      - .env
    ports:
      - "5434:5432"
    volumes:
      - smartcampus_new_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  smartcampus_new_data:
