server.port=8080

# ============================================================
# PostgreSQL Profile (use with Docker Compose)
# Credentials loaded from .env file or environment variables
# ============================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartcampusdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:smartcampus}
spring.datasource.password=${DB_PASSWORD:smartcampus}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Init (seed data via data.sql -- uses H2 syntax, skip for PostgreSQL)
spring.sql.init.mode=never
